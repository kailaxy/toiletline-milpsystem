services:
  - type: web
    name: milpsystem-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: milpsystem-db
          property: connectionString

databases:
  - name: milpsystem-db
    plan: free